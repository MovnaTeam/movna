name: movna
description: Movna is an open-source training application.
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.0.0+0

environment:
  sdk: '^3.8.0'

dependencies:
  drift: ^2.34.1
  drift_flutter: ^0.3.1
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_i18n: ^0.37.1
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.3.1
  flutter_map_animations: ^0.10.0
  flutter_map_location_marker: ^10.2.0
  flutter_map_tile_caching: ^10.1.1
  flutter_svg: ^2.3.0
  freezed_annotation: ^3.1.0
  geolocator: ^14.0.3
  get_it: ^9.2.1
  go_router: ^17.3.0
  injectable: ^3.0.0
  intl: ^0.20.2
  json_annotation: ^4.12.0
  json_locale: ^1.0.2
  latlong2: ^0.9.1
  logger: ^2.7.0
  meta: ^1.17.0
  mutex: ^3.1.0
  package_info_plus: ^10.2.0
  path: ^1.9.1
  path_provider: ^2.1.6
  permission_handler: ^12.0.3
  restart_app: ^1.8.3
  result_dart: ^2.2.0
  shared_preferences: ^2.5.5
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.15.1
  drift_dev: ^2.34.0
  flutter_gen_runner: ^5.14.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  go_router_builder: ^4.3.0
  injectable_generator: ^3.0.2
  json_locale_generator: ^1.3.0
  json_serializable: ^6.14.0
  test: ^1.26.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  default-flavor: dev

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/poppins/Poppins-ThinItalic.ttf
          weight: 100
          style: italic

        - asset: assets/fonts/poppins/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/poppins/Poppins-ExtraLightItalic.ttf
          weight: 200
          style: italic

        - asset: assets/fonts/poppins/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/poppins/Poppins-LightItalic.ttf
          weight: 300
          style: italic

        - asset: assets/fonts/poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/poppins/Poppins-Italic.ttf
          weight: 400
          style: italic

        - asset: assets/fonts/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/poppins/Poppins-MediumItalic.ttf
          weight: 500
          style: italic

        - asset: assets/fonts/poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/poppins/Poppins-SemiBoldItalic.ttf
          weight: 600
          style: italic

        - asset: assets/fonts/poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/poppins/Poppins-BoldItalic.ttf
          weight: 700
          style: italic

        - asset: assets/fonts/poppins/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/poppins/Poppins-ExtraBoldItalic.ttf
          weight: 800
          style: italic

        - asset: assets/fonts/poppins/Poppins-Black.ttf
          weight: 900
        - asset: assets/fonts/poppins/Poppins-BlackItalic.ttf
          weight: 900
          style: italic


json_to_dart:
  sample_files:
    - source: assets/translations/en.json
      class_name: LocaleKeys
      plural_matcher: "-[0-9]+$"

flutter_gen:
  fonts:
    outputs:
      package_parameter_enabled: true